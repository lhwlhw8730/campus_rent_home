<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>도서 상세 정보</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#47614A",
                        "on-surface": "#1c1c1a",
                        "on-surface-variant": "#434842",
                        "background": "#fcf9f6"
                    }
                }
            }
        };
    </script>
    <style>
        body { 
            background-color: #F3F2EF; 
            font-family: 'Noto Sans KR', 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        .material-symbols-outlined { 
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; 
        }
        
        /* 모바일 뷰 전용 고정 레이아웃 */
        .mobile-frame {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: #FAF9F6;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
        }

        .active-scale:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 0px;
        }

        /* 하단 바 높이만큼 메인 콘텐츠 여백 확보 */
        main {
            padding-bottom: 120px;
        }
    </style>
</head>
<body class="bg-stone-100 dark:bg-stone-950 flex justify-center">

    <div class="mobile-frame bg-[#FAF9F6] dark:bg-stone-900">
        
        <!-- Header: Sticky but contained within mobile-frame -->
        <header class="sticky top-0 w-full z-50 flex justify-between items-center px-4 h-14 bg-[#FAF9F6]/90 dark:bg-stone-900/90 backdrop-blur-md border-b border-[#E8E6E1] dark:border-stone-800">
            <!-- Back Button with history.back() -->
            <button onclick="history.back()" class="active-scale p-2 rounded-full hover:bg-stone-200/50 dark:hover:bg-stone-800 transition-colors">
                <span class="material-symbols-outlined text-[#5F7A61] dark:text-[#8AA88D]">arrow_back</span>
            </button>
            <h2 class="text-sm font-bold tracking-tight text-on-surface dark:text-stone-200">상세 정보</h2>
            <button class="active-scale p-2 rounded-full hover:bg-stone-200/50 dark:hover:bg-stone-800 transition-colors">
                <span class="material-symbols-outlined text-[#5F7A61] dark:text-[#8AA88D]">share</span>
            </button>
        </header>

        <!-- Scrollable Content -->
        <main class="flex-1 overflow-y-auto custom-scrollbar">
            <!-- Book Cover Image -->
            <div class="relative w-full aspect-[4/5] overflow-hidden bg-stone-200">
                <img 
                    class="w-full h-full object-cover" 
                    alt="교재 이미지" 
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKrSMBESfUpojLnyN2wLkmvpPr03P4wksJkgTysz1ELo03wk2c86I8bf94rM9nRkHwIFH_JGoQVoEAHr2P2jJCqZA0w9O_GrnLPdZ4PjW0qarAmCxTX1EYH87xWsD4Su9I9mGR8yLjL0TVL-ac--x-ypVeXPtEph5zmOr6ZtrLwYH6EynMHmgKY4ihxSDaR4UsFEfieLrKUxdTIwR7SirKW9ZDoB9yqZFk0BwzgYTIuFgiU1Q_oi82UjT_wK1uzedJDrMGqhCV9EAh"
                >
                <div class="absolute bottom-0 left-0 w-full h-24 bg-gradient-to-t from-black/20 to-transparent"></div>
            </div>

            <div class="px-5 -mt-8 relative z-10">
                <!-- Book Info Card -->
                <div class="bg-white dark:bg-stone-800 p-6 rounded-2xl shadow-xl shadow-stone-200/50 dark:shadow-none border border-[#E8E6E1] dark:border-stone-700">
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="px-3 py-1 bg-[#E7F3E7] text-[#334D36] text-[11px] font-bold rounded-full">S급 (필기 없음)</span>
                        <span class="px-3 py-1 bg-[#E3F2FD] text-[#36485B] text-[11px] font-bold rounded-full">직거래 권장</span>
                    </div>
                    <h1 class="text-2xl font-bold text-on-surface dark:text-stone-100 mb-1 leading-tight">마케팅원론(제15판)</h1>
                    <p class="text-sm text-on-surface-variant dark:text-stone-400 mb-4">이희정 교수 저</p>
                    
                    <div class="h-[1px] w-full bg-stone-100 dark:bg-stone-700 my-4"></div>
                    
                    <div class="flex items-center justify-between">
                        <div class="flex items-baseline gap-1">
                            <span class="text-3xl font-extrabold text-[#47614A] dark:text-[#8AA88D]">5,000원</span>
                            <span class="text-sm text-stone-400">/ 학기</span>
                        </div>
                        <div class="text-[10px] bg-stone-100 dark:bg-stone-700 px-2 py-1 rounded text-stone-500">정가 35,000원</div>
                    </div>
                </div>

                <!-- Seller Profile -->
                <section class="mt-6">
                    <div class="flex items-center gap-4 p-4 bg-white dark:bg-stone-800 rounded-2xl border border-[#E8E6E1] dark:border-stone-700 active-scale transition-transform cursor-pointer">
                        <div class="relative">
                            <div class="w-12 h-12 rounded-full bg-[#5F7A61] flex items-center justify-center text-white font-bold text-lg">김</div>
                            <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-yellow-400 border-2 border-white dark:border-stone-800 rounded-full flex items-center justify-center">
                                <span class="material-symbols-outlined text-[12px] text-white font-bold">verified</span>
                            </div>
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center justify-between">
                                <span class="text-md font-bold text-on-surface dark:text-stone-100">김선배</span>
                                <span class="text-[11px] font-bold text-[#47614A] dark:text-[#8AA88D]">매너온도 98%</span>
                            </div>
                            <p class="text-xs text-on-surface-variant dark:text-stone-400">경영학과 · 학생인증 완료</p>
                        </div>
                        <span class="material-symbols-outlined text-stone-300">chevron_right</span>
                    </div>
                </section>

                <!-- Description -->
                <section class="mt-8">
                    <h3 class="text-lg font-bold text-on-surface dark:text-stone-100 mb-3 px-1">도서 상세 설명</h3>
                    <div class="bg-white dark:bg-stone-800 p-5 rounded-2xl border border-[#E8E6E1] dark:border-stone-700 text-sm leading-relaxed text-on-surface-variant dark:text-stone-300">
                        <p class="mb-4">학기에 사용한 전공 필수 교재입니다. 거의 새 책에 가까우며 낙서나 하이라이트 전혀 없습니다.</p>
                        <p>직거래는 학교 정문에서 선호합니다.</p>
                    </div>
                </section>

                <!-- Location Map -->
                <section class="mt-8">
                    <div class="flex justify-between items-center mb-3 px-1">
                        <h3 class="text-lg font-bold text-on-surface dark:text-stone-100">거래 희망 위치</h3>
                        <span class="text-xs text-[#5F7A61] font-semibold">지도 보기</span>
                    </div>
                    <div class="flex items-center gap-2 mb-3 text-sm text-on-surface dark:text-stone-200">
                        <span class="material-symbols-outlined text-[#47614A] text-lg">location_on</span>
                        <span class="font-medium">경기대학교 수원캠퍼스 정문</span>
                    </div>
                    <div class="w-full h-44 rounded-2xl overflow-hidden border border-[#E8E6E1] dark:border-stone-700 relative">
                        <img 
                            class="w-full h-full object-cover grayscale opacity-90 dark:invert dark:opacity-70" 
                            alt="지도" 
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBZGm5Vr_qVN_vL4IL-NXy_xg3TMVDnPH4-s0z8xZbqsRedFxovmY67SwG58kV9qM7uchp-FORgyuEC9V1pSJvyGz14dWLdg_v06PxBvDXy_pC8ueuHuvm-wwaaDbcFS2EEaqNjV9czyP1ELFQ8LENewVedfYSrlpal88JRSREjTL2-0UKM6jYp8QkzS90Uvl9eozPXU68bJ4B8aRk8XitBssPeY1vFwv7s-U_zebUqsIs1ylL5ARiS2W1nfEqAIHy82Bu3IF_GyHBI"
                        >
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <span class="material-symbols-outlined text-4xl text-[#ba1a1a] drop-shadow-md">location_on</span>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Bottom Action Bar: Fixed to the mobile frame -->
        <div class="sticky bottom-0 w-full z-50 bg-white/95 dark:bg-stone-900/95 backdrop-blur-lg border-t border-stone-200 dark:border-stone-800 p-4 flex items-center gap-3">
            <button id="likeBtn" class="active-scale w-12 h-12 flex items-center justify-center rounded-xl border border-stone-200 dark:border-stone-700 text-stone-400 hover:bg-stone-50 dark:hover:bg-stone-800 transition-colors">
                <span class="material-symbols-outlined">favorite</span>
            </button>
            <button class="active-scale w-12 h-12 flex items-center justify-center rounded-xl border border-stone-200 dark:border-stone-700 text-stone-400 hover:bg-stone-50 dark:hover:bg-stone-800 transition-colors">
                <span class="material-symbols-outlined">chat_bubble</span>
            </button>
            <button class="active-scale flex-1 h-12 bg-[#47614A] hover:bg-[#3d5340] text-white font-bold rounded-xl shadow-lg shadow-green-900/10 transition-all">
                대여 신청하기
            </button>
        </div>

    </div>

    <script>
        // 하트 버튼 인터랙션
        const likeBtn = document.getElementById('likeBtn');
        let isLiked = false;

        likeBtn.addEventListener('click', () => {
            isLiked = !isLiked;
            const icon = likeBtn.querySelector('.material-symbols-outlined');
            if(isLiked) {
                icon.style.fontVariationSettings = "'FILL' 1";
                icon.classList.add('text-red-500');
                likeBtn.classList.add('border-red-100', 'bg-red-50');
            } else {
                icon.style.fontVariationSettings = "'FILL' 0";
                icon.classList.remove('text-red-500');
                likeBtn.classList.remove('border-red-100', 'bg-red-50');
            }
        });

        // 다크모드 대응 (OS 설정 기준)
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
